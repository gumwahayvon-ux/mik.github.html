<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
        }

        .container {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Регистрация</h2>

    <input type="text" id="name" placeholder="Аты-жөнү">
    <input type="number" id="year" placeholder="Туулган жылы">

    <button onclick="saveData()">Сактоо</button>
</div>

<script>
function saveData() {
    let name = document.getElementById("name").value;
    let year = document.getElementById("year").value;

    if(name === "" || year === "") {
        alert("Бардык талааны толтуруңуз!");
        return;
    }

    alert("Аты-жөнү: " + name + "\nТуулган жылы: " + year);
}
</script>

</body>
</html>
