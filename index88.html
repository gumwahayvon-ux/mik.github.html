<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Еда мира</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
  }

  body{
    background:#0f172a;
    color:white;
  }

  /* ===== ГЛАВНАЯ ===== */
  .hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
  }

  .hero h1{
    font-size:60px;
    margin-bottom:15px;
  }

  .hero p{
    font-size:20px;
    color:#cbd5e1;
    margin-bottom:30px;
  }

  .hero button{
    padding:15px 40px;
    border:none;
    border-radius:40px;
    font-size:18px;
    cursor:pointer;
    background:#f97316;
    color:white;
    transition:0.3s;
  }

  .hero button:hover{
    transform:scale(1.1);
    background:#fb923c;
  }

  /* ===== ГАЛЕРЕЯ ===== */
  .gallery{
    display:none;
    padding:50px;
  }

  .title{
    text-align:center;
    font-size:45px;
    margin-bottom:40px;
    color:#f97316;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
  }

  .card{
    background:#1e293b;
    border-radius:20px;
    overflow:hidden;
    transition:0.3s;
  }

  .card:hover{
    transform:scale(1.05);
  }

  img{
    width:100%;
    height:200px;
    object-fit:cover;
  }

  .text{
    padding:15px;
    text-align:center;
  }

  .back{
    display:block;
    text-align:center;
    margin-top:40px;
    padding:12px 25px;
    background:#334155;
    color:white;
    border-radius:30px;
    width:200px;
    margin-left:auto;
    margin-right:auto;
    cursor:pointer;
  }

  .back:hover{
    background:#475569;
  }
</style>
</head>

<body>

<!-- ===== ГЛАВНАЯ СТРАНИЦА ===== -->
<div class="hero" id="home">

  <h1>🍔 ЕДА МИРА 🌍</h1>

  <p>Нажми кнопку и открой вкусные блюда</p>

  <button onclick="openGallery()">
    Смотреть еду
  </button>

</div>

<!-- ===== ГАЛЕРЕЯ ===== -->
<div class="gallery" id="gallery">

  <h2 class="title">🌍 Блюда мира</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
      <div class="text">Бургер 🍔</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
      <div class="text">Пицца 🍕</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
      <div class="text">Суши 🍣</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">
      <div class="text">Салаты 🥗</div>
    </div>

  </div>

  <div class="back" onclick="backHome()">
    ⬅ Назад
  </div>

</div>

<script>
  function openGallery(){
    document.getElementById("home").style.display = "none";
    document.getElementById("gallery").style.display = "block";
  }

  function backHome(){
    document.getElementById("gallery").style.display = "none";
    document.getElementById("home").style.display = "flex";
  }
</script>

</body>
</html>
